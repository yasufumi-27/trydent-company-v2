<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, 'Times New Roman', serif">
  <style>
    .rays{animation:spin 14s linear infinite;transform-box:fill-box;transform-origin:center}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tag{animation:swing 2.6s ease-in-out infinite;transform-origin:648px 128px}
    @keyframes swing{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
    .shine{animation:shine 3.6s linear infinite}
    @keyframes shine{0%{transform:translateX(-420px) skewX(-20deg)}100%{transform:translateX(900px) skewX(-20deg)}}
    .spark{animation:tw 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .spark.d2{animation-delay:.7s}.spark.d3{animation-delay:1.4s}
    @keyframes tw{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <rect width="800" height="500" fill="#0B0B0D"/>
  <radialGradient id="bg" cx="50%" cy="42%" r="75%">
    <stop offset="0" stop-color="#1B1710"/><stop offset="1" stop-color="#0B0B0D"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="18" y="18" width="764" height="464" fill="none" stroke="#C9A227" stroke-opacity=".35" stroke-width="2"/>

  <!-- 背景の回転光条 -->
  <g class="rays" opacity=".12">
    <g fill="#E8D9A0" transform="translate(400 300)">
      <path d="M0 0L-40 -300h80z"/><path d="M0 0L-40 -300h80z" transform="rotate(60)"/>
      <path d="M0 0L-40 -300h80z" transform="rotate(120)"/><path d="M0 0L-40 -300h80z" transform="rotate(180)"/>
      <path d="M0 0L-40 -300h80z" transform="rotate(240)"/><path d="M0 0L-40 -300h80z" transform="rotate(300)"/>
    </g>
  </g>

  <!-- ショーケース台座 -->
  <ellipse cx="400" cy="400" rx="290" ry="34" fill="#15151A" stroke="#C9A227" stroke-width="3"/>
  <ellipse cx="400" cy="392" rx="252" ry="26" fill="#1E1E24" stroke="#C9A227" stroke-width="2" stroke-opacity=".6"/>

  <!-- 展示車両（Maserati GranTurismo／ビアンコアルピ：ロングノーズの流麗なファストバック） -->
  <g>
    <path d="M196 372
             C192 371 190 368 189 364
             L187 350
             C186 344 186 338 188 333
             C190 327 194 324 200 322
             C214 318 232 315 252 313
             C282 310 316 308 348 308
             L358 307
             C370 292 384 281 400 276
             C412 272 424 271 436 273
             C446 274 456 278 464 283
             C482 292 500 302 516 311
             C532 318 548 323 562 327
             C576 330 592 333 606 337
             C618 340 626 344 630 349
             C633 355 633 362 629 367
             C627 371 623 372 618 372
             L578 372 A 38 38 0 0 0 502 372
             L310 372 A 38 38 0 0 0 234 372 Z"
          fill="#EFEDE6" stroke="#A8A496" stroke-width="3.5"/>
    <clipPath id="carbody"><path d="M196 372 C192 371 190 368 189 364 L187 350 C186 344 186 338 188 333 C190 327 194 324 200 322 C214 318 232 315 252 313 C282 310 316 308 348 308 L358 307 C370 292 384 281 400 276 C412 272 424 271 436 273 C446 274 456 278 464 283 C482 292 500 302 516 311 C532 318 548 323 562 327 C576 330 592 333 606 337 C618 340 626 344 630 349 C633 355 633 362 629 367 C627 371 623 372 618 372 L578 372 A 38 38 0 0 0 502 372 L310 372 A 38 38 0 0 0 234 372 Z"/></clipPath>
    <g clip-path="url(#carbody)"><rect class="shine" x="0" y="240" width="110" height="150" fill="#FFFFFF" opacity=".35"/></g>
    <!-- フェンダーパネルライン -->
    <path d="M240 336 A 36 36 0 0 1 304 334" fill="none" stroke="#CFCBBE" stroke-width="2"/>
    <path d="M508 332 A 36 36 0 0 1 572 336" fill="none" stroke="#CFCBBE" stroke-width="2"/>
    <!-- キャビングラス（流麗なファストバック） -->
    <path d="M362 307 C372 294 384 284 399 279 C410 275 422 274 433 276 C443 278 452 282 460 287 C476 296 490 304 504 312 C456 310 406 308 362 307 Z" fill="#10171D" stroke="#5A6068" stroke-width="2.5"/>
    <line x1="446" y1="282" x2="452" y2="309" stroke="#5A6068" stroke-width="2"/>
    <!-- フロントグリル・3連サイドベント -->
    <ellipse cx="191" cy="349" rx="8" ry="13" fill="#15161A"/>
    <g fill="#8A867A"><rect x="318" y="320" width="5" height="11" rx="2"/><rect x="328" y="319" width="5" height="11" rx="2"/><rect x="338" y="318" width="5" height="11" rx="2"/></g>
    <!-- キャラクターライン・ドア -->
    <path d="M210 342 C340 334 480 336 612 347" fill="none" stroke="#CFCBBE" stroke-width="2"/>
    <path d="M366 309 C364 330 364 350 366 370 M470 314 C470 333 471 352 474 370" fill="none" stroke="#CFCBBE" stroke-width="2"/>
    <rect x="418" y="320" width="18" height="5" rx="2.5" fill="#C9C5B8" stroke="#A8A496" stroke-width="1.2"/>
    <ellipse cx="218" cy="319" rx="14" ry="5" fill="#E8D9A0" stroke="#B9A75E" stroke-width="1.5" transform="rotate(-10 218 319)"/>
    <rect x="620" y="340" width="10" height="6" rx="3" fill="#F35B45"/>
    <circle cx="272" cy="366" r="30" fill="#0B0B0D" stroke="#C9A227" stroke-width="4"/>
    <circle cx="272" cy="366" r="10" fill="#15151A" stroke="#E8D9A0" stroke-width="3"/>
    <circle cx="540" cy="366" r="30" fill="#0B0B0D" stroke="#C9A227" stroke-width="4"/>
    <circle cx="540" cy="366" r="10" fill="#15151A" stroke="#E8D9A0" stroke-width="3"/>
  </g>

  <!-- 揺れるプライスタグ -->
  <g class="tag">
    <line x1="648" y1="128" x2="648" y2="170" stroke="#C9A227" stroke-width="3"/>
    <g transform="rotate(-6 648 210)">
      <rect x="606" y="170" width="84" height="52" rx="8" fill="#C9A227"/>
      <circle cx="648" cy="182" r="5" fill="#0B0B0D"/>
      <text x="648" y="208" text-anchor="middle" fill="#0B0B0D" font-size="20" font-weight="bold" letter-spacing="2">SALE</text>
    </g>
  </g>
  <circle cx="648" cy="126" r="5" fill="#E8D9A0"/>

  <!-- スパークル -->
  <g fill="#E8D9A0">
    <path class="spark" d="M150 160l6 15 15 6-15 6-6 15-6-15-15-6 15-6z"/>
    <path class="spark d2" d="M230 110l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path class="spark d3" d="M560 140l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
  </g>

  <text x="400" y="82" text-anchor="middle" fill="#E8D9A0" font-size="30" letter-spacing="12">SALES</text>
  <text x="400" y="108" text-anchor="middle" fill="#8A8A8A" font-size="13" letter-spacing="6">USED &amp; IMPORT CARS</text>
</svg>
