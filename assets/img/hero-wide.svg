<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, 'Times New Roman', serif">
  <style>
    .sign{animation:neon 2.8s ease-in-out infinite}
    @keyframes neon{0%,100%{opacity:1}50%{opacity:.55}}
    .star{animation:tw 2.6s ease-in-out infinite}
    .star.d2{animation-delay:.9s}.star.d3{animation-delay:1.7s}
    @keyframes tw{0%,100%{opacity:.15}50%{opacity:1}}
    .beam{animation:beam 3.2s ease-in-out infinite}
    @keyframes beam{0%,100%{opacity:.18}50%{opacity:.42}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <rect width="800" height="500" fill="#0B0B0D"/>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0B0B12"/><stop offset="1" stop-color="#14110B"/>
  </linearGradient>
  <rect width="800" height="360" fill="url(#sky)"/>
  <rect x="18" y="18" width="764" height="464" fill="none" stroke="#C9A227" stroke-opacity=".35" stroke-width="2"/>

  <!-- 星 -->
  <g fill="#E8D9A0">
    <circle class="star" cx="120" cy="70" r="2.5"/><circle class="star d2" cx="240" cy="110" r="2"/>
    <circle class="star d3" cx="660" cy="80" r="2.5"/><circle class="star" cx="720" cy="140" r="2"/>
