  <g stroke="#2E2E34" stroke-width="3"><line x1="180" y1="260" x2="360" y2="260"/><line x1="180" y1="280" x2="360" y2="280"/><line x1="180" y1="300" x2="360" y2="300"/><line x1="180" y1="320" x2="360" y2="320"/><line x1="180" y1="340" x2="360" y2="340"/></g>
