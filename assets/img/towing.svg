    <g fill="#C9A227" opacity=".55">
      <rect x="-40" y="438" width="70" height="7" rx="3.5"/><rect x="120" y="438" width="70" height="7" rx="3.5"/>
      <rect x="280" y="438" width="70" height="7" rx="3.5"/><rect x="440" y="438" width="70" height="7" rx="3.5"/>
      <rect x="600" y="438" width="70" height="7" rx="3.5"/><rect x="760" y="438" width="70" height="7" rx="3.5"/>
      <rect x="920" y="438" width="70" height="7" rx="3.5"/>
    </g>
  </g>

  <!-- レッカー車（フラットベッド） -->
  <g class="bob">
    <!-- ビーコンの光 -->
    <ellipse class="glow" cx="612" cy="212" rx="60" ry="30" fill="#F39800" opacity=".22"/>
    <rect class="beacon" x="598" y="206" width="28" height="14" rx="5" fill="#F39800"/>
    <!-- キャブ -->
