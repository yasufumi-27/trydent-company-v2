<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, 'Times New Roman', serif">
  <style>
    .spark{animation:tw 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .spark.d2{animation-delay:.7s}.spark.d3{animation-delay:1.4s}
    @keyframes tw{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1)}}
    .cheer{animation:cheer 1.5s ease-in-out infinite;transform-origin:656px 242px}
    @keyframes cheer{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-10deg)}}
    .hop{animation:hop 1.5s ease-in-out infinite}
    @keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <rect width="800" height="500" fill="#0B0B0D"/>
  <radialGradient id="bg" cx="50%" cy="45%" r="75%">
    <stop offset="0" stop-color="#181410"/><stop offset="1" stop-color="#0B0B0D"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="18" y="18" width="764" height="464" fill="none" stroke="#C9A227" stroke-opacity=".35" stroke-width="2"/>

  <!-- 地面 -->
  <ellipse cx="360" cy="408" rx="300" ry="22" fill="#15151A"/>
  <ellipse cx="648" cy="410" rx="66" ry="10" fill="#15151A"/>

  <!-- 納車された86（フラットベクターイラスト・右向き） -->
  <g transform="translate(48 241) scale(0.85)">
    <!-- GTウイング -->
    <rect x="2" y="42" width="9" height="24" rx="2" fill="#1A1C20"/>
    <path d="M6 48 L150 44 L150 54 L6 58 Z" fill="#16181C"/>
    <path d="M6 48 L150 44 L150 47 L6 51 Z" fill="#3A3E44"/>
    <path d="M70 104 C63 88 62 70 66 54 L76 54 C72 70 73 88 80 102 Z" fill="#1A1C20"/>
    <path d="M106 102 C101 88 101 72 105 56 L114 56 C110 72 110 88 115 100 Z" fill="#1A1C20"/>
    <!-- ボディ -->
    <path d="M46 166 C43 152 43 136 49 126 L54 116 C62 110 76 106 92 104 C150 100 172 92 198 80 C224 60 256 52 288 52 C318 53 346 63 368 78 C394 88 412 94 438 97 C478 100 516 103 544 107 C564 110 576 114 581 121 C586 129 587 141 585 151 L582 163 C580 173 572 177 563 178 L48 172 Z" fill="#F2F1EC"/>
    <!-- 下部シェード -->
    <path d="M45 160 L584 152 L582 163 C580 173 572 177 563 178 L48 172 Z" fill="#D9D7CE"/>
    <!-- ルーフハイライト -->
    <path d="M196 80 C224 58 256 52 288 52 C312 53 334 60 352 69 L348 73 C318 60 288 57 262 59 C236 62 214 70 202 84 Z" fill="#FFFFFF"/>
    <!-- グラス -->
    <path d="M194 82 C222 62 256 55 288 55 C318 56 344 65 366 80 L354 90 C310 99 246 101 206 98 L198 90 Z" fill="#171E26"/>
    <path d="M216 72 L244 60 L226 96 L208 95 Z" fill="#3D4C5C" opacity=".8"/>
    <line x1="296" y1="55" x2="302" y2="100" stroke="#0D1218" stroke-width="4"/>
    <!-- パネルシーム -->
    <g fill="none" stroke="#BDBBB1" stroke-width="2">
      <path d="M290 100 C289 126 289 150 290 172"/>
      <path d="M426 97 C428 124 430 150 431 172"/>
      <path d="M118 102 C146 112 164 128 170 148"/>
      <path d="M120 138 C260 132 420 128 560 130"/>
    </g>
    <!-- ドアハンドル・ミラー -->
    <rect x="332" y="114" width="24" height="7" rx="3.5" fill="#DEDCD3" stroke="#B4B2A8" stroke-width="1.5"/>
    <path d="M362 88 L354 80" stroke="#1A1C20" stroke-width="3"/>
    <path d="M360 76 q14 -4 16 6 q-2 8 -14 4 z" fill="#1A1C20"/>
    <!-- ヘッドライト -->
    <path d="M534 106 C552 108 568 112 577 119 C582 124 581 130 573 130 L526 119 C522 114 525 108 534 106 Z" fill="#E9E5D4" stroke="#B9B39B" stroke-width="2"/>
    <circle cx="558" cy="116" r="4" fill="#FFF7DE" stroke="#8A7A3C" stroke-width="1.5"/>
    <!-- グリル・フロントバンパー -->
    <path d="M548 138 L585 143 L583 158 L546 156 Z" fill="#101216"/>
    <path d="M552 142 L581 146 M551 149 L581 152" stroke="#23262C" stroke-width="2.5" fill="none"/>
    <path d="M528 160 L583 163 L580 172 L560 176 L528 168 Z" fill="#16181C"/>
    <!-- テールランプ -->
    <path d="M47 116 C55 112 65 111 73 112 L71 124 C63 122 55 123 48 126 Z" fill="#D2493A"/>
    <path d="M47 116 C55 112 65 111 73 112 L72 116 C64 115 55 116 47 119 Z" fill="#E9887C"/>
    <!-- リアバンパー下部 -->
    <path d="M44 158 L96 162 L95 172 L46 170 Z" fill="#16181C"/>
    <!-- サイドスカート -->
    <path d="M206 170 L404 172 L403 178 L207 176 Z" fill="#16181C"/>
    <!-- 86バッジ（ゴールド） -->
    <text x="380" y="132" fill="#C9A227" font-size="15" font-family="Georgia, serif" letter-spacing="1">86</text>
    <!-- ホイールアーチ -->
    <path d="M111 172 A44 44 0 0 1 199 172 Z" fill="#111318"/>
    <path d="M411 173 A44 44 0 0 1 499 173 Z" fill="#111318"/>
    <g>
      <circle cx="155" cy="150" r="42" fill="#0C0D10"/>
      <circle cx="155" cy="150" r="42" fill="none" stroke="#000" stroke-width="1.5" opacity=".5"/>
      <circle cx="155" cy="150" r="27" fill="#22252A"/>
      <circle cx="155" cy="150" r="25" fill="none" stroke="#4A4E55" stroke-width="3"/>
      <line x1="155" y1="150" x2="175.1" y2="154.3" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="155" y1="150" x2="161.3" y2="169.5" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="155" y1="150" x2="141.3" y2="165.2" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="155" y1="150" x2="134.9" y2="145.7" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="155" y1="150" x2="148.7" y2="130.5" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="155" y1="150" x2="168.7" y2="134.8" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/>
      <circle cx="155" cy="150" r="6.5" fill="#3A3E44" stroke="#575C63" stroke-width="2"/>
      <circle cx="155" cy="150" r="2.5" fill="#C9A227"/>
    </g>
    <g>
      <circle cx="455" cy="150" r="42" fill="#0C0D10"/>
      <circle cx="455" cy="150" r="42" fill="none" stroke="#000" stroke-width="1.5" opacity=".5"/>
      <circle cx="455" cy="150" r="27" fill="#22252A"/>
      <circle cx="455" cy="150" r="25" fill="none" stroke="#4A4E55" stroke-width="3"/>
      <line x1="455" y1="150" x2="475.1" y2="154.3" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="455" y1="150" x2="461.3" y2="169.5" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="455" y1="150" x2="441.3" y2="165.2" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="455" y1="150" x2="434.9" y2="145.7" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="455" y1="150" x2="448.7" y2="130.5" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/><line x1="455" y1="150" x2="468.7" y2="134.8" stroke="#575C63" stroke-width="5.5" stroke-linecap="round"/>
      <circle cx="455" cy="150" r="6.5" fill="#3A3E44" stroke="#575C63" stroke-width="2"/>
      <circle cx="455" cy="150" r="2.5" fill="#C9A227"/>
    </g>
  </g>

  <!-- オーナー（グッジョブ！） -->
  <g class="hop">
    <!-- 上げた腕＋サムズアップ（振り上げアニメーション） -->
    <g class="cheer">
      <path d="M654 242 L676 222 L690 202" fill="none" stroke="#C9A227" stroke-width="17" stroke-linecap="round"/>
      <path d="M654 242 L676 222 L690 202" fill="none" stroke="#1E1E24" stroke-width="12" stroke-linecap="round"/>
      <g transform="rotate(-14 692 192)">
        <rect x="680" y="182" width="25" height="24" rx="8" fill="#E8C39E"/>
        <rect x="678" y="160" width="11" height="26" rx="5.5" fill="#E8C39E"/>
      </g>
    </g>
    <!-- 頭 -->
    <circle cx="640" cy="196" r="21" fill="#E8C39E"/>
    <path d="M619 192 a21 21 0 0 1 42 0 l-6 -4 q-4 -8 -12 -9 q-14 -1 -18 8 z" fill="#2A2320"/>
    <!-- にっこり -->
    <path d="M632 202 q8 7 16 0" fill="none" stroke="#7A5A3A" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="632" cy="193" r="2.2" fill="#3A2E24"/><circle cx="649" cy="193" r="2.2" fill="#3A2E24"/>
    <!-- 体（ジャケット） -->
    <path d="M622 222 h36 q10 0 12 12 l6 60 q0 10 -10 10 h-52 q-10 0 -10 -10 l6 -60 q2 -12 12 -12z" fill="#1E1E24" stroke="#C9A227" stroke-width="2"/>
    <line x1="640" y1="226" x2="640" y2="302" stroke="#C9A227" stroke-width="2"/>
    <!-- 下げた腕 -->
    <path d="M616 232 L606 268 L610 296" fill="none" stroke="#C9A227" stroke-width="17" stroke-linecap="round"/>
    <path d="M616 232 L606 268 L610 296" fill="none" stroke="#1E1E24" stroke-width="12" stroke-linecap="round"/>
    <circle cx="611" cy="302" r="8" fill="#E8C39E"/>
    <!-- 脚 -->
    <path d="M628 304 L626 398 M652 304 L654 398" stroke="#26262E" stroke-width="15" stroke-linecap="round"/>
    <path d="M618 402 h18 v-8 q-14 -4 -18 2 z M646 394 q4 -6 18 -2 v8 h-18 z" fill="#0B0B0D" stroke="#C9A227" stroke-width="1.5"/>
  </g>

  <!-- サムズアップ強調スパーク -->
  <g fill="#E8D9A0">
    <path class="spark" d="M718 168l5 13 13 5-13 5-5 13-5-13-13-5 13-5z"/>
    <path class="spark d2" d="M186 150l6 16 16 6-16 6-6 16-6-16-16-6 16-6z"/>
    <path class="spark d3" d="M560 130l5 13 13 5-13 5-5 13-5-13-13-5 13-5z"/>
  </g>

  <text x="400" y="446" text-anchor="middle" fill="#E8D9A0" font-size="28" letter-spacing="10">PURCHASE &amp; TRADE-IN</text>
  <text x="400" y="472" text-anchor="middle" fill="#8A8A8A" font-size="13" letter-spacing="6">FREE APPRAISAL</text>
</svg>
